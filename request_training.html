<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Request Training | PRC-QC ERU</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .form-card {
            background: white;
            border-top: 4px solid #dc2626;
        }
    </style>
</head>
<body>

    <nav class="bg-white p-4 border-b border-gray-200 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="RED CROSS EMBLEM.png" class="h-8">
                <span class="font-black uppercase tracking-tighter text-slate-900 text-sm">Training Division</span>
            </div>
            <a href="ERU2.HTML" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-red-600">← Return to Home</a>
        </div>
    </nav>

    <header class="bg-slate-900 py-12 px-6 text-white text-center">
        <h1 class="text-3xl font-black uppercase tracking-tight mb-2">Training Request Portal</h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">Official Command Intake Form</p>
    </header>

    <main class="container mx-auto py-12 px-6 max-w-2xl">
        <div class="form-card p-8 rounded-xl shadow-2xl">
            <form id="trainingForm" class="space-y-6">
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-red-600 uppercase tracking-widest border-b pb-2">Applicant Details</h3>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Organization / Name</label>
                        <input type="text" name="from_name" id="from_name" required class="w-full bg-slate-50 border border-slate-200 rounded p-3 text-sm outline-none focus:border-red-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Contact Email</label>
                        <input type="email" name="reply_to" id="reply_to" required class="w-full bg-slate-50 border border-slate-200 rounded p-3 text-sm outline-none focus:border-red-600">
                    </div>
                </div>

                <div class="space-y-4 pt-4">
                    <h3 class="text-[10px] font-black text-red-600 uppercase tracking-widest border-b pb-2">Course Selection</h3>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Requested Module</label>
                        <select name="training_type" id="training_type" required class="w-full bg-slate-50 border border-slate-200 rounded p-3 text-sm outline-none">
                            <option value="WASAR">WASAR (Water Search and Rescue)</option>
                            <option value="CSSR">CSSR (Collapsed Structure Search & Rescue)</option>
                            <option value="FIRE">Basic Firefighting</option>
                            <option value="SURVIVAL">Basic Survival Skills</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Estimated Pax</label>
                        <input type="number" name="pax_count" id="pax_count" required class="w-full bg-slate-50 border border-slate-200 rounded p-3 text-sm outline-none">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded uppercase tracking-widest text-xs shadow-lg shadow-red-600/20 transition-all">
                        Send Official Request
                    </button>
                </div>
            </form>

            <div id="successMsg" class="hidden text-center py-10 space-y-4">
                <div class="text-4xl">✅</div>
                <h3 class="text-xl font-black uppercase text-slate-900">Request Dispatched</h3>
                <p class="text-sm text-slate-500 leading-relaxed">The training request has been sent to <strong>egongora121695@gmail.com</strong>. The ERU Training Division will contact the applicant shortly.</p>
                <button onclick="window.location.href='ERU2.HTML'" class="text-[10px] font-black text-red-600 uppercase tracking-widest underline">Return to Main Portal</button>
            </div>
        </div>
    </main>

    <script type="text/javascript">
        // INITIALIZE EMAILJS - You will need to create a free account at emailjs.com to get your Public Key
        (function () {
            emailjs.init("YOUR_PUBLIC_KEY");
        })();

        document.getElementById('trainingForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "DISPATCHING...";
            btn.disabled = true;

            // This sends the actual email
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(function () {
                    document.getElementById('trainingForm').classList.add('hidden');
                    document.getElementById('successMsg').classList.remove('hidden');
                }, function (error) {
                    alert("FAILED to send request. Check your EmailJS configuration.");
                    btn.innerText = "RETRY DISPATCH";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
